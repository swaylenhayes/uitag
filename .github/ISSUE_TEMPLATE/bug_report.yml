name: Bug Report
description: Report a bug in uitag
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue
      placeholder: |
        1. Run `uitag screenshot.png`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead

  - type: input
    id: version
    attributes:
      label: uitag version
      description: Output of `pip show uitag | grep Version`
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: macOS version
      description: Output of `sw_vers -productVersion`
      placeholder: "15.x / 26.x"
    validations:
      required: true

  - type: input
    id: chip
    attributes:
      label: Apple Silicon chip
      placeholder: "M1 / M2 / M3 / M4"

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any error messages or traceback
      render: shell
